<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychiatrische Anstalt</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(180deg,#020617,#0f172a,#000);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:700px;
            max-width:95%;
            background:rgba(10,15,25,.9);
            border:2px solid #2563eb;
            border-radius:15px;
            padding:30px;
            text-align:center;
            box-shadow:0 0 20px rgba(37,99,235,.4);
        }

        .logo{
            width:180px;
            border-radius:15px;
            border:3px solid #2563eb;
            margin-bottom:20px;
        }

        h1{
            color:#60a5fa;
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
            margin:10px 0;
            line-height:1.6;
        }

        .info{
            background:#111827;
            border-left:4px solid #3b82f6;
            padding:15px;
            margin:20px 0;
            border-radius:8px;
        }

        .button{
            display:inline-block;
            margin-top:20px;
            padding:14px 28px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-size:18px;
            transition:.3s;
        }

        .button:hover{
            background:#1d4ed8;
            transform:scale(1.05);
        }

        footer{
            margin-top:25px;
            color:gray;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="logo.jpg" alt="Discord Logo" class="logo">

    <h1>🏥 Psychiatrische Anstalt</h1>

    <p>
        Willkommen auf unserem Discord-Server!
    </p>

    <div class="info">
        <h3>📋 Server Informationen</h3>
        <p>
            💬 Chatting Discord<br>
            😈 Trolling Discord<br>
            🎉 Community & Unterhaltung
        </p>
    </div>

    <div class="info">
        <h3>🔗 Discord Einladung</h3>
        <p>https://discord.gg/NvgSWSEHnz</p>
    </div>

    <a class="button" href="https://discord.gg/NvgSWSEHnz" target="_blank">
        Discord beitreten
    </a>

    <footer>
        © Psychiatrische Anstalt
    </footer>

</div>

</body>
</html>
